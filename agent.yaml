kind: hosted
name: SpecialistMesh
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: '1.0'
  memory: 2.0Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: ENABLE_SENSITIVE_DATA
    value: true
dockerfile_path: Dockerfile
