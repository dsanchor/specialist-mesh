name: specialist-mesh
description: Multi-agent specialist mesh for billing, IAM, ticketing, and knowledge workflows.
template:
  name: specialist-mesh
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: ENABLE_SENSITIVE_DATA
      value: true
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
