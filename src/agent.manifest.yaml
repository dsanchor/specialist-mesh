name: specialist-mesh
description: Multi-agent specialist mesh for billing, IAM, ticketing, and knowledge workflows.
template:
  name: specialist-mesh
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: FOUNDRY_PROJECT_ENDPOINT
      value: ${FOUNDRY_PROJECT_ENDPOINT}
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: GITHUB_PAT
      value: ${GITHUB_PAT}
    - name: AZURE_SEARCH_ENDPOINT
      value: ${AZURE_SEARCH_ENDPOINT}
    - name: AZURE_SEARCH_INDEX_NAME
      value: ${AZURE_SEARCH_INDEX_NAME}
    - name: ENABLE_SENSITIVE_DATA
      value: true
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
